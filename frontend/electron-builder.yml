appId: com.orbitalguard.ai
productName: Orbital Guard AI
copyright: Copyright © 2026 Orbital Guard AI

# Directories
directories:
  output: dist-electron
  buildResources: electron/assets

# Build files
files:
  - build/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json

# Windows
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: electron/assets/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Orbital Guard AI

# macOS
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/assets/icon.icns
  category: public.app-category.education
  artifactName: ${productName}-${version}.${ext}

dmg:
  title: ${productName} ${version}
  icon: electron/assets/icon.icns
  window:
    width: 540
    height: 380

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: electron/assets/icon.png
  category: Education
  artifactName: ${productName}-${version}.${ext}

# Publish (for auto-updates)
publish:
  provider: github
  owner: yourusername
  repo: orbital-guard-ai
